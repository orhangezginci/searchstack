services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  embedding-service:
    build: ./services/embedding-service
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  image-downloader:
    build: ./services/image-downloader
    volumes:
      - ./images:/images
    environment:
      - IMAGES_DIR=/images
    restart: "no"

  clip-embedding-service:
    build: ./services/clip-embedding-service
    ports:
      - "8005:8005"
    volumes:
      - ./images:/images:ro
    environment:
      - PYTHONUNBUFFERED=1
      - IMAGES_DIR=/images
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  vector-search-service:
    build: ./services/vector-search-service
    ports:
      - "8002:8002"
    depends_on:
      qdrant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  keyword-search-service:
    build: ./services/keyword-search-service
    ports:
      - "8003:8003"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    build: ./services/ingestion-service
    ports:
      - "8004:8004"
    depends_on:
      rabbitmq:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      vector-search-service:
        condition: service_healthy
      keyword-search-service:
        condition: service_healthy
      clip-embedding-service:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CLIP_EMBEDDING_SERVICE_URL=http://clip-embedding-service:8005
      - REDIS_HOST=redis

  frontend:
    build: ./services/frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/public:/app/public
      - ./images:/app/public/images:ro
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  seeder:
    image: curlimages/curl:latest
    depends_on:
      ingestion-service:
        condition: service_healthy
    volumes:
      - ./seed.sh:/seed.sh
    command: sh /seed.sh
    restart: "no"

  image-seeder:
    build: ./services/image-seeder
    depends_on:
      image-downloader:
        condition: service_completed_successfully
      clip-embedding-service:
        condition: service_healthy
      vector-search-service:
        condition: service_healthy
    volumes:
      - ./images:/images:ro
    environment:
      - IMAGES_DIR=/images
      - CLIP_URL=http://clip-embedding-service:8005
      - VECTOR_URL=http://vector-search-service:8002
    restart: "no"

volumes:
  qdrant_data:
  elasticsearch_data:
